name: Snippet E2E (mocked)

# Audit 2026-04 — Vague 2 / Worker B1.
# Runs the ~13 Playwright specs in tests/specs/ against doomcheck +
# athletedatahub + floral-nuxt with a freshly built korvus.min.js.
#
# Repo layout:
#   - this repo (korvus-test-sites) is checked out at path: test_website
#   - KorvusFR/korvus is checked out at path: platform via PAT, so the
#     test helpers can read platform/snippet/dist/korvus.min.js after build.
# This reproduces the dual-repo layout that tests/global-setup.ts and
# tests/helpers/inject-snippet.ts assume (they lookup
# ../platform/snippet/dist/korvus.min.js relative to the tests dir).

on:
  pull_request:
    branches: [main]
    paths:
      - "tests/**"
      - "apps/athletedatahub/**"
      - "apps/doomcheck/**"
      - "apps/floral-nuxt/**"
      - ".github/workflows/snippet-e2e-mocked.yml"
  push:
    branches: [main]
    paths:
      - "tests/**"
      - "apps/athletedatahub/**"
      - "apps/doomcheck/**"
      - "apps/floral-nuxt/**"
      - ".github/workflows/snippet-e2e-mocked.yml"
  repository_dispatch:
    types: [snippet-changed]
  workflow_dispatch:
    inputs:
      platform_ref:
        description: "Ref/SHA of KorvusFR/korvus to checkout (default: main)"
        required: false
        default: "main"

concurrency:
  group: snippet-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  snippet-e2e-mocked:
    name: snippet-e2e-mocked (${{ matrix.label }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: true
      matrix:
        include:
          # REQUIRED — bloquants
          - label: chromium
            projects: "athletedatahub doomcheck floral-nuxt-fr floral-nuxt-es floral-nuxt-it"
            browsers: "chromium"
            blocking: true
          - label: mobile-chrome
            projects: "doomcheck-mobile-chrome"
            browsers: "chromium"
            blocking: true
          - label: webkit
            projects: "athletedatahub-webkit doomcheck-webkit"
            browsers: "webkit"
            blocking: true
          # Best effort — continue-on-error
          - label: firefox
            projects: "doomcheck-firefox"
            browsers: "firefox"
            blocking: false
          - label: mobile-safari
            projects: "doomcheck-mobile-safari"
            browsers: "webkit"
            blocking: false
    steps:
      - name: Checkout test_website (this repo)
        uses: actions/checkout@v5
        with:
          path: test_website

      - name: Checkout platform (KorvusFR/korvus)
        uses: actions/checkout@v5
        with:
          repository: KorvusFR/korvus
          path: platform
          token: ${{ secrets.KORVUS_PLATFORM_PAT }}
          ref: ${{ github.event.client_payload.platform_sha || github.event.inputs.platform_ref || 'main' }}

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            platform/package-lock.json
            test_website/tests/package-lock.json

      - name: Install platform deps
        working-directory: platform
        run: npm ci

      - name: Install test_website tests deps
        working-directory: test_website/tests
        run: npm ci

      # Playwright's webServer config (tests/playwright.config.ts) spawns
      # `npm run dev` in each app — so each app needs its own node_modules
      # or Next/Nuxt isn't on PATH and the spawn dies with exit 127.
      - name: Install apps deps
        run: |
          for app in athletedatahub taguardian-com doomcheck floral-nuxt; do
            if [ -f "test_website/apps/$app/package.json" ]; then
              echo "::group::npm ci — $app"
              (cd "test_website/apps/$app" && npm ci)
              echo "::endgroup::"
            else
              echo "Skipping $app (not present on this ref)"
            fi
          done

      - name: Prisma generate (required by snippet build)
        working-directory: platform
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"
        run: npx prisma generate

      - name: Build snippet (korvus.min.js)
        working-directory: platform
        run: npm run snippet:build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ matrix.browsers }}-${{ hashFiles('test_website/tests/package-lock.json') }}

      - name: Install Playwright system deps (${{ matrix.browsers }})
        working-directory: test_website/tests
        run: npx playwright install-deps ${{ matrix.browsers }}

      - name: Install Playwright browsers (${{ matrix.browsers }})
        working-directory: test_website/tests
        run: npx playwright install ${{ matrix.browsers }}

      - name: Run Playwright (${{ matrix.label }} — blocking)
        if: matrix.blocking == true
        working-directory: test_website/tests
        env:
          CI: "true"
        run: |
          PROJECTS_ARGS=""
          for p in ${{ matrix.projects }}; do
            PROJECTS_ARGS="$PROJECTS_ARGS --project=$p"
          done
          npx playwright test $PROJECTS_ARGS

      - name: Run Playwright (${{ matrix.label }} — best effort)
        if: matrix.blocking == false
        continue-on-error: true
        working-directory: test_website/tests
        env:
          CI: "true"
        run: |
          PROJECTS_ARGS=""
          for p in ${{ matrix.projects }}; do
            PROJECTS_ARGS="$PROJECTS_ARGS --project=$p"
          done
          npx playwright test $PROJECTS_ARGS

      - name: Upload Playwright report (${{ matrix.label }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-snippet-${{ matrix.label }}
          path: test_website/tests/playwright-report/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload traces & screenshots (${{ matrix.label }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-snippet-${{ matrix.label }}
          path: test_website/tests/test-results/
          retention-days: 14
          if-no-files-found: ignore
